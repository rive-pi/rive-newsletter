<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rive PI — Edition #01</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f7f4; color: #1a1a1a; }
    nav { background: #0f1923; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { color: #fff; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; }
    .nav-back { color: #8a9bb0; font-size: 12px; padding: 6px 14px; border-radius: 6px; cursor: pointer; border: none; background: none; text-decoration: none; transition: all 0.15s; }
    .nav-back:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .hero { background: #0f1923; padding: 40px 32px 48px; }
    .hero-edition { font-size: 10px; color: #4a7fa8; letter-spacing: 0.14em; font-weight: 600; margin-bottom: 10px; }
    .hero-title { color: #fff; font-size: 26px; font-weight: 600; line-height: 1.3; margin-bottom: 8px; max-width: 600px; }
    .hero-meta { font-size: 12px; color: #5a7a94; }
    .hero-meta span { color: #8a9bb0; margin: 0 6px; }
    .content { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }
    .newsletter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 700px) { .newsletter-grid { grid-template-columns: 1fr; } }
    .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: #9ca3af; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #e5e2db; }
    .deal-card { background: #fff; border: 0.5px solid #e5e2db; border-radius: 10px; padding: 16px; margin-bottom: 12px; display: flex; gap: 12px; align-items: flex-start; }
    .deal-sector-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
    .badge-Rail { background: #E6F1FB; color: #0C447C; }
    .badge-Aviation { background: #EAF3DE; color: #27500A; }
    .badge-Shipping { background: #FAEEDA; color: #633806; }
    .badge-Engines { background: #EEEDFE; color: #3C3489; }
    .deal-body .deal-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; line-height: 1.4; }
    .deal-body .deal-meta { font-size: 11px; color: #9ca3af; }
    .news-card { background: #fff; border-left: 3px solid #0f1923; padding: 14px 16px; margin-bottom: 12px; }
    .news-tag { font-size: 10px; font-weight: 700; color: #4a7fa8; letter-spacing: 0.1em; margin-bottom: 4px; }
    .news-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; line-height: 1.4; }
    .news-body { font-size: 12px; color: #6b7280; line-height: 1.7; }
  </style>
</head>
<body>

<nav>
  <span class="nav-logo">RIVE PRIVATE INVESTMENT</span>
  <a class="nav-back" href="../index.html">← Back to latest</a>
</nav>

<div class="hero">
  <div class="hero-edition" id="arc-edition"></div>
  <div class="hero-title" id="arc-title"></div>
  <div class="hero-meta" id="arc-meta"></div>
</div>

<div class="content">
  <div class="newsletter-grid">
    <div>
      <div class="section-label">DEALS THIS FORTNIGHT</div>
      <div id="arc-deals"></div>
    </div>
    <div>
      <div class="section-label">MACRO & GEOPOLITICS</div>
      <div id="arc-macro"></div>
    </div>
  </div>
</div>

<script>
  // Ce fichier charge les données depuis archive-01.json
  fetch('edition-01.json')
    .then(r => r.json())
    .then(data => {
      document.getElementById('arc-edition').textContent = data.edition_label;
      document.getElementById('arc-title').textContent = data.edition_title;
      document.getElementById('arc-meta').innerHTML = data.deals.length + ' deals tracked <span>·</span> ' + data.macro_stories.length + ' macro stories';

      document.getElementById('arc-deals').innerHTML = data.deals.map(d => `
        <div class="deal-card">
          <span class="deal-sector-badge badge-${d.sector}">${d.sector}</span>
          <div class="deal-body">
            <div class="deal-title">${d.title}</div>
            <div class="deal-meta">${d.value} · ${d.geography} · ${d.type}</div>
          </div>
        </div>
      `).join('');

      document.getElementById('arc-macro').innerHTML = data.macro_stories.map(m => `
        <div class="news-card">
          <div class="news-tag">${m.tag}</div>
          <div class="news-title">${m.title}</div>
          <div class="news-body">${m.body}</div>
        </div>
      `).join('');
    });
</script>

</body>
</html>
